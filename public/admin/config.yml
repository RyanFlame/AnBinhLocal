backend:
  name: git-gateway
  branch: main 

# Enable i18n
i18n:
  structure: multiple_files
  locales: [vi, en]
  default_locale: vi

publish_mode: editorial_workflow

media_folder: "public/Asset"
public_folder: "/Asset"

collections:
  - name: "content"
    label: "Website Content"
    delete: false # Prevent accidental deletion of the whole content file
    i18n: true
    files:
      - name: "homepage"
        label: "Home Page & Global"
        file: "src/i18n/locales/{{locale}}.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", i18n: true }
              - { label: "Description", name: "desc", widget: "text", i18n: true }
              - label: "Booking Bar"
                name: "booking"
                widget: "object"
                fields:
                  - { label: "Treatment Label", name: "treatment", widget: "string", i18n: true }
                  - { label: "Name Label", name: "name", widget: "string", i18n: true }
                  - { label: "Date Label", name: "date", widget: "string", i18n: true }
                  - { label: "Time Label", name: "time", widget: "string", i18n: true }
                  - { label: "Submit Button", name: "submit", widget: "string", i18n: true }

          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Home", name: "home", widget: "string", i18n: true }
              - { label: "About", name: "about", widget: "string", i18n: true }
              - { label: "Booking", name: "booking", widget: "string", i18n: true }
              - { label: "Blog", name: "blog", widget: "string", i18n: true }

          - label: "Location Carousel"
            name: "location"
            widget: "object"
            fields:
              - label: "Step 1"
                name: "step1"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string", i18n: true }
                  - { label: "Heading", name: "heading", widget: "string", i18n: true }
                  - { label: "Button Text", name: "btn_text", widget: "string", i18n: true }
              - label: "Step 2"
                name: "step2"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string", i18n: true }
                  - { label: "Heading", name: "heading", widget: "string", i18n: true }
                  - { label: "Button Text", name: "btn_text", widget: "string", i18n: true }
              - label: "Step 3"
                name: "step3"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string", i18n: true }
                  - { label: "Heading", name: "heading", widget: "string", i18n: true }
                  - { label: "Button Text", name: "btn_text", widget: "string", i18n: true }

          - label: "Philosophy Section"
            name: "philosophy"
            widget: "object"
            fields:
              - label: "Main Section"
                name: "section"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string", i18n: true }
                  - { label: "Subtitle", name: "subtitle", widget: "string", i18n: true }
                  - { label: "Body", name: "body", widget: "text", i18n: true }
              - label: "Herbs Detail"
                name: "herbs"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string", i18n: true }
                  - { label: "Subtitle", name: "subtitle", widget: "string", i18n: true }
                  - { label: "Body", name: "body", widget: "text", i18n: true }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand Slogan", name: "brand_slogan", widget: "string", i18n: true }
              - { label: "Copyright", name: "copyright", widget: "string", i18n: true }

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    i18n: true
    slug: "{{year}}-{{month}}-{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Excerpt", name: "excerpt", widget: "text", i18n: true }
      - { label: "Author", name: "author", widget: "string", default: "Dr. An" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["Dinh Dưỡng", "Thảo Dược", "Lối Sống", "Trị Liệu", "Tin Tức"],
        }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
