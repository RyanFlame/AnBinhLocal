backend:
  name: git-gateway
  branch: main 

# Enable i18n
i18n:
  structure: multiple_files
  locales: [vi, en]
  default_locale: vi

publish_mode: editorial_workflow

media_folder: "src/assets"
public_folder: ""

collections:
  - label: "🇻🇳 Website Pages (Vietnamese)"
    name: "pages_vi"
    files:
      - label: "🏠 Home Page"
        name: "home_page"
        file: "src/i18n/locales/vi/home.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Background Image", name: "bg_image", widget: "image" }
              - label: "Booking Form Labels"
                name: "booking"
                widget: "object"
                fields:
                  - { label: "Treatment Label", name: "treatment", widget: "string" }
                  - { label: "Treatment Placeholder", name: "treatment_placeholder", widget: "string" }
                  - { label: "Name Label", name: "name", widget: "string" }
                  - { label: "Name Placeholder", name: "name_placeholder", widget: "string" }
                  - { label: "Date Label", name: "date", widget: "string" }
                  - { label: "Date Placeholder", name: "date_placeholder", widget: "string" }
                  - { label: "Time Label", name: "time", widget: "string" }
                  - { label: "Time Placeholder", name: "time_placeholder", widget: "string" }
                  - { label: "Submit Button", name: "submit", widget: "string" }

          - label: "Location Section"
            name: "location"
            widget: "object"
            fields:
              - label: "Step 1"
                name: "step1"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Button Text", name: "btn_text", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
              - label: "Step 2"
                name: "step2"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Button Text", name: "btn_text", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
              - label: "Step 3"
                name: "step3"
                widget: "object"
                fields:
                  - { label: "Subheading", name: "sub", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Button Text", name: "btn_text", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
              - label: "Corner Stats"
                name: "corner"
                widget: "object"
                fields:
                  - { label: "Know More Link", name: "know_more", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "string" }

          - label: "Philosophy Section"
            name: "philosophy"
            widget: "object"
            fields:
              - label: "Our Philosophy"
                name: "section"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "string" }
                  - { label: "Body Text", name: "body", widget: "text" }
                  - { label: "Button Text", name: "btn", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
              - label: "Herbs Selection"
                name: "herbs"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "string" }
                  - { label: "Body Text", name: "body", widget: "text" }
                  - { label: "Button Text", name: "btn", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }

          - label: "Bento (Therapies List)"
            name: "bento"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Explore Button", name: "btn_explore", widget: "string" }
              - { label: "Main Image", name: "image", widget: "image" }
              - label: "Therapy Names"
                name: "card"
                widget: "object"
                fields:
                  - { label: "Acupuncture", name: "acupuncture", widget: "string" }
                  - { label: "Medicines", name: "medicines", widget: "string" }
                  - { label: "Diagnosis", name: "diagnosis", widget: "string" }
                  - { label: "Nutrition", name: "nutrition", widget: "string" }
                  - { label: "Acupressure", name: "acupressure", widget: "string" }
                  - { label: "Physical Therapy", name: "physical_therapy", widget: "string" }

          - label: "FAQ Section"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Sub Title", name: "title_sub", widget: "string" }
              - { label: "Main Title", name: "title_main", widget: "string" }
              - label: "Question 1"
                name: "q1"
                widget: "object"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }
              - label: "Question 2"
                name: "q2"
                widget: "object"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }
              - label: "Question 3"
                name: "q3"
                widget: "object"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }

          - label: "Patient Reviews"
            name: "reviews"
            widget: "object"
            fields:
              - { label: "Sub Title", name: "title_sub", widget: "string" }
              - { label: "Main Title", name: "title_main", widget: "string" }
              - { label: "Body Text", name: "body", widget: "text" }
              - label: "Review Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Condition", name: "condition", widget: "string" }
                  - { label: "Comment", name: "text", widget: "text" }
                  - { label: "Avatar", name: "avatar", widget: "image" }

      - label: "📝 About Page"
        name: "about_page"
        file: "src/i18n/locales/vi/about.json"
        fields:
          - label: "About Page Content"
            name: "about"
            widget: "object"
            fields:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Link/Button Text", name: "link", widget: "string" }
                  - { label: "Hero Image", name: "image", widget: "image" }
              - label: "Bento Section"
                name: "bento"
                widget: "object"
                fields:
                  - { label: "Small Label", name: "label", widget: "string" }
                  - { label: "Headline", name: "title", widget: "string" }
                  - { label: "Body Copy", name: "desc", widget: "text" }
                  - { label: "Link", name: "link", widget: "string" }
                  - { label: "Left Image", name: "img_left", widget: "image" }
                  - { label: "Right Image", name: "img_right", widget: "image" }

              - label: "Detailed Info (Tabs)"
                name: "tabs"
                widget: "object"
                fields:
                  - label: "Why Choose Us"
                    name: "why"
                    widget: "object"
                    fields:
                      - { label: "Pill Title", name: "pill", widget: "string" }
                      - { label: "Main Title", name: "title", widget: "string" }
                      - label: "Feature 1"
                        name: "f1"
                        widget: "object"
                        fields:
                          - { label: "Title", name: "title", widget: "string" }
                          - { label: "Desc", name: "desc", widget: "text" }
                      - label: "Feature 2"
                        name: "f2"
                        widget: "object"
                        fields:
                          - { label: "Title", name: "title", widget: "string" }
                          - { label: "Desc", name: "desc", widget: "text" }

                  - label: "Our Journey"
                    name: "journey"
                    widget: "object"
                    fields:
                      - { label: "Pill Title", name: "pill", widget: "string" }
                      - { label: "Headline", name: "title", widget: "string" }
                      - { label: "Body", name: "desc", widget: "text" }

              - label: "Services Provided"
                name: "services"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - label: "Service Panes"
                    name: "panel"
                    widget: "object"
                    fields:
                      - label: "Private Care"
                        name: "private"
                        widget: "object"
                        fields:
                          - { label: "Headline", name: "title", widget: "string" }
                          - { label: "Body", name: "desc", widget: "text" }
                          - { label: "Image", name: "image", widget: "image" }
                      - label: "Herbal Remedies"
                        name: "herbal"
                        widget: "object"
                        fields:
                          - { label: "Title", name: "title", widget: "string" }
                          - { label: "Body", name: "desc", widget: "text" }
                          - { label: "Highlight", name: "highlight", widget: "string" }

              - label: "Bottom CTA"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Headline", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Button", name: "btn", widget: "string" }

      - label: "🍱 Ingredients Page"
        name: "ingredients_page"
        file: "src/i18n/locales/vi/ingredients.json"
        fields:
          - label: "Ingredients Page Content"
            name: "ingredients"
            widget: "object"
            fields:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Sub Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Button", name: "btn", widget: "string" }
                  - { label: "Background", name: "bg", widget: "image" }
                  - label: "Corner Stats"
                    name: "corner"
                    widget: "object"
                    fields:
                      - { label: "Pill Label", name: "label", widget: "string" }
                      - label: "Stat 1"
                        name: "stat1"
                        widget: "object"
                        fields:
                          - { label: "Number", name: "num", widget: "string" }
                          - { label: "Label", name: "label", widget: "string" }
                      - label: "Stat 2"
                        name: "stat2"
                        widget: "object"
                        fields:
                          - { label: "Number", name: "num", widget: "string" }
                          - { label: "Label", name: "label", widget: "string" }

              - label: "Our Difference"
                name: "why"
                widget: "object"
                fields:
                  - { label: "Headline", name: "title", widget: "string" }
                  - { label: "Text", name: "desc", widget: "text" }

              - label: "Deeper Description (Editorial)"
                name: "editorial"
                widget: "object"
                fields:
                  - { label: "Heading 1", name: "label1", widget: "string" }
                  - { label: "Major Statement", name: "statement", widget: "text" }
                  - { label: "Section 1 Body", name: "body1", widget: "text" }
                  - { label: "Section 2 Body", name: "body2", widget: "text" }
                  - { label: "Quote", name: "quote", widget: "text" }
                  - { label: "Button", name: "link", widget: "string" }

              - label: "Bottom Page Info"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Button", name: "btn", widget: "string" }

      - label: "🕯️ Therapies Page"
        name: "therapies_page"
        file: "src/i18n/locales/vi/therapies.json"
        fields:
          - label: "Therapies Page Content"
            name: "therapies"
            widget: "object"
            fields:
              - { label: "Tab Label", name: "title", widget: "string" }
              - { label: "Headline Title", name: "page_title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

      - label: "📢 Blog Overview Layout"
        name: "blog_index_page"
        file: "src/i18n/locales/vi/blog.json"
        fields:
          - label: "Blog Main Config"
            name: "blog"
            widget: "object"
            fields:
              - { label: "Hero Title", name: "title", widget: "string" }
              - label: "Hero Slider Titles"
                name: "hero"
                widget: "object"
                fields:
                  - label: "Category Labels"
                    name: "cat"
                    widget: "object"
                    fields:
                      - { label: "Therapy", name: "therapy", widget: "string" }
                      - { label: "Herbs", name: "herbs", widget: "string" }
                  - label: "Slide 1"
                    name: "slide1"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                  - label: "Slide 2"
                    name: "slide2"
                    widget: "object"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }

              - label: "Sections"
                name: "latest"
                widget: "object"
                fields:
                  - { label: "Latest title", name: "title", widget: "string" }

      - label: "🌐 Global Site Config"
        name: "global_common"
        file: "src/i18n/locales/vi/common.json"
        fields:
          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Home", name: "home", widget: "string" }
              - { label: "About", name: "about", widget: "string" }
              - { label: "Booking", name: "booking", widget: "string" }
              - { label: "Blog", name: "blog", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand Slogan", name: "brand_slogan", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "text" }
              - label: "Hours Title", name: "hours_title", widget: "string"
              - label: "Opening Hours (Mon-Fri)", name: "hours", widget: "object", fields:
                  - { label: "Time", name: "mon_fri", widget: "string" }

  - label: "🇺🇸 Website Pages (English)"
    name: "pages_en"
    files:
      - label: "🏠 Home Page"
        name: "home_page"
        file: "src/i18n/locales/en/home.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Background", name: "bg_image", widget: "image" }

  - label: "📰 Blog Articles"
    name: "blog"
    folder: "src/content/blog"
    i18n: true
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Hero Image", name: "heroImage", widget: "image", i18n: false }
      - { label: "Description", name: "description", widget: "string", i18n: true }
      - { label: "Publication Date", name: "pubDate", widget: "datetime", i18n: false }
      - { label: "Category", name: "category", widget: "select", options: ["Sống Khỏe", "Trị Liệu", "Thảo Dược", "Dinh Dưỡng"], i18n: false }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
